# electron-builder config for the SheJane (石间) desktop app.
# See docs/operations.md for packaging and release details.

appId: com.shejane.desktop
productName: 石间
copyright: Copyright © SheJane
# ASCII artifact filenames (the installed app is still 石间.app):
artifactName: SheJane-${version}-${arch}.${ext}

directories:
  output: release

# What goes inside the asar: built renderer + Electron main/preload + runtime
# assets (main.cjs loads app-icon.png plus platform-specific tray icons).
files:
  - dist/**/*
  - electron/**/*.cjs
  - electron/assets/**/*
  - shared/**/*
  - package.json

asar: true

# The frozen Python Runtime, shipped outside the asar so main.cjs can spawn it
# from process.resourcesPath/runtime. Build it FIRST with `make build-daemon`
# (per-OS/arch — the bundle is native-wheel specific, so CI must build it on a
# native runner for each target before electron-builder runs).
#
extraResources:
  - from: ../../services/runtime/dist/shejane-runtime
    to: runtime

mac:
  category: public.app-category.productivity
  icon: electron/assets/app-icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip # required by electron-updater (Phase 5)
      arch: [arm64, x64]
  # Enable only after the bundled Runtime is signed too.
  hardenedRuntime: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.inherit.plist

win:
  # electron-builder generates the .ico from the 1024px PNG.
  icon: electron/assets/app-icon.png
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Refuse to install on < Windows 10 with a clear message. The app runs on
  # Electron 33 (requires Win10+); without this, Win7/8.1 users hit a cryptic
  # shortcut-creation error and a silently non-launching app. See build/installer.nsh.
  include: build/installer.nsh

# Auto-update feed (electron-updater): published installers + latest*.yml land
# on GitHub Releases; the installed app checks here on launch. electron-builder
# only publishes when invoked with `--publish always` (the release workflow) or
# a tagged CI build — local `dist`/`dist:dir` and the manual build-windows
# workflow do NOT publish.
publish:
  provider: github
  owner: jimmyrogue
  repo: SheJane
