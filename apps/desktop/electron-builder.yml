# electron-builder config for the SheJane (石间) desktop app.
# See docs/operations.md for packaging and release details.

appId: com.shejane.desktop
productName: 石间
copyright: Copyright © SheJane
# ASCII artifact filenames (the installed app is still 石间.app):
artifactName: SheJane-${version}-${arch}.${ext}

directories:
  output: release

# What goes inside the asar: built renderer + Electron main/preload + runtime
# assets (main.cjs loads app-icon.png plus platform-specific tray icons).
files:
  - dist/**/*
  - electron/**/*.cjs
  - electron/assets/**/*
  - shared/**/*
  - package.json

asar: true

# The frozen Python Runtime ships outside the asar so main.cjs can spawn it
# from process.resourcesPath/runtime. Build it first with `make build-daemon`.
# Desktop CI does the same on a native runner for each target OS and architecture.
#
extraResources:
  - from: ../../services/runtime/dist/shejane-runtime
    to: runtime

mac:
  category: public.app-category.productivity
  icon: electron/assets/app-icon.icns
  target:
    - dmg
    - zip # required by electron-updater (Phase 5)
  # Enable only after the bundled Runtime is signed too.
  hardenedRuntime: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.inherit.plist

win:
  # electron-builder generates the .ico from the 1024px PNG.
  icon: electron/assets/app-icon.png
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Refuse to install on < Windows 10 with a clear message. The app runs on
  # Electron 33 (requires Win10+); without this, Win7/8.1 users hit a cryptic
  # shortcut-creation error and a silently non-launching app. See build/installer.nsh.
  include: build/installer.nsh

# Auto-update feed (electron-updater): Desktop CI uploads installers and
# latest*.yml. The tag-only release job publishes those files to GitHub;
# electron-builder itself always runs with `--publish never`.
publish:
  provider: github
  owner: jimmyrogue
  repo: SheJane
