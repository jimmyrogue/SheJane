name: Release Cloud

on:
  push:
    tags: ["cloud-v*"]
  workflow_dispatch:

concurrency:
  group: release-cloud-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/shejane-cloud
          tags: |
            type=match,pattern=cloud-v(.*),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/cloud-v') }}
            type=sha,enable=${{ github.ref_type != 'tag' }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: services/cloud
          file: services/cloud/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cloud
          cache-to: type=gha,mode=max,scope=cloud
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/shejane-cloud@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/shejane-cloud@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: shejane-cloud-${{ github.ref_name }}.spdx.json
      - uses: sigstore/cosign-installer@v4.1.2
      - env:
          COSIGN_YES: "true"
        run: cosign sign ghcr.io/${{ github.repository_owner }}/shejane-cloud@${{ steps.build.outputs.digest }}
