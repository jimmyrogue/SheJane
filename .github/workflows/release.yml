name: Release

# Build + publish the three deployable images (api / client / admin) to
# GitHub Container Registry. Triggered by pushing a `vX.Y.Z` tag — the
# `make release VERSION=vX.Y.Z` target does that for you. Also runnable
# by hand (workflow_dispatch) to rebuild `:latest` from the current ref.
#
# The Local Agent Harness daemon is NOT published here — it ships inside
# the Electron desktop app, it isn't a server-side container.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Avoid two overlapping builds of the same ref racing to push tags.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write

jobs:
  images:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # api: no Vite build arg.
          - service: api
            context: ./api
            dockerfile: api/Dockerfile
            build-args: ""
          # client/admin are static SPAs: building with an EMPTY
          # VITE_API_BASE_URL makes them issue RELATIVE, same-origin
          # /api/* requests, which Caddy routes to the api container.
          # That's what makes one published image work for any deployer
          # (no per-site API URL baked in at build time).
          - service: client
            context: .
            dockerfile: client/Dockerfile
            build-args: |
              VITE_API_BASE_URL=
          - service: admin
            context: .
            dockerfile: apps/admin/Dockerfile
            build-args: |
              VITE_API_BASE_URL=
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name automatically.
          images: ghcr.io/${{ github.repository_owner }}/shejane-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Prepare supply-chain metadata
        id: supply
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          image_ref="$(printf '%s\n' "${TAGS}" | head -n1)@${DIGEST}"
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "sbom_file=shejane-${{ matrix.service }}-${safe_ref}.spdx.json" >> "${GITHUB_OUTPUT}"

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.supply.outputs.image_ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.supply.outputs.image_ref }}
          format: spdx-json
          artifact-name: ${{ steps.supply.outputs.sbom_file }}
          output-file: ${{ steps.supply.outputs.sbom_file }}
          upload-artifact: true
          upload-release-assets: false

      - name: Attach SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          SBOM_FILE: ${{ steps.supply.outputs.sbom_file }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --draft --title "${GITHUB_REF_NAME}" \
              --notes "Container images are published to GHCR." || \
            gh release view "${GITHUB_REF_NAME}" >/dev/null
          gh release upload "${GITHUB_REF_NAME}" "${SBOM_FILE}" --clobber

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image digests
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              images="${images}${tag}@${DIGEST} "
            fi
          done <<EOF
          ${TAGS}
          EOF
          cosign sign ${images}
