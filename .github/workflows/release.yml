name: Release

# Build + publish the three deployable images (api / client / admin) to
# GitHub Container Registry. Triggered by pushing a `vX.Y.Z` tag — the
# `make release VERSION=vX.Y.Z` target does that for you. Also runnable
# by hand (workflow_dispatch) to rebuild `:latest` from the current ref.
#
# The Local Agent Harness daemon is NOT published here — it ships inside
# the Electron desktop app, it isn't a server-side container.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Avoid two overlapping builds of the same ref racing to push tags.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # api: no Vite build arg.
          - service: api
            build-args: ""
          # client/admin are static SPAs: building with an EMPTY
          # VITE_API_BASE_URL makes them issue RELATIVE, same-origin
          # /api/* requests, which Caddy routes to the api container.
          # That's what makes one published image work for any deployer
          # (no per-site API URL baked in at build time).
          - service: client
            build-args: |
              VITE_API_BASE_URL=
          - service: admin
            build-args: |
              VITE_API_BASE_URL=
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name automatically.
          images: ghcr.io/${{ github.repository_owner }}/shejane-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
