name: Windows desktop — build / release

# Two modes, one workflow (runs on a GitHub-hosted Windows machine — no local
# Windows needed):
#   • Manual (Actions → Run workflow): builds an UNSIGNED .exe and uploads it as
#     a downloadable artifact. Good for sending a test build to a friend.
#   • On a v* tag: builds AND publishes the installer + the electron-updater feed
#     (latest.yml + .exe + .blockmap) to the GitHub Release, so installed apps
#     auto-update. electron-builder creates a DRAFT release — review it, then
#     click "Publish release" to roll the update out.
#
# Still UNSIGNED (Windows SmartScreen "unrecognized app" cold-start applies).
# Code signing + the macOS build are Phase 4 — see docs/desktop-distribution.md.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # electron-builder needs this to create/update the Release on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The daemon's native wheels are platform-specific, so the freeze MUST run
      # on Windows. Pin Python to match requires-python.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Freeze the local-agent daemon (Windows, PyInstaller onedir)
        working-directory: local-host/python
        run: |
          uv sync
          uv run pyinstaller shejane-local-host.spec --noconfirm --clean

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build the renderer (→ prod API)
        working-directory: client
        shell: bash
        run: |
          npm ci
          # On a tag build, pin the package version to the tag so the installer
          # filename, the published Release, and the electron-updater feed all
          # agree. electron-builder versions everything off package.json, NOT the
          # git tag — without this the version stays whatever package.json says
          # (it drifted to 0.1.0 once) and auto-update never fires.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          fi
          npm run build:desktop

      - name: Package the Windows installer
        working-directory: client
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned build
        run: npx electron-builder --win --publish never

      # electron-builder's own GitHub publisher races into TWO draft releases per
      # tag (one ends up with the .exe + latest.yml, the other with just the
      # .blockmap). We publish ourselves instead: one idempotent draft per tag,
      # carrying only the installer + the electron-updater feed (latest.yml). The
      # .blockmap (delta-update optimization) is dropped to keep the Release
      # clean — auto-update falls back to a full download without it. The user
      # reviews the draft and clicks Publish.
      - name: Publish installer to a single draft Release (tag builds only)
        if: github.ref_type == 'tag'
        working-directory: client
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --draft --title "$tag" \
              --notes "Automated desktop build for $tag. Unsigned (Windows SmartScreen cold-start applies)."
          gh release upload "$tag" release/*.exe release/latest.yml --clobber

      - name: Upload installer artifact (manual builds)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: shejane-windows-installer
          path: |
            client/release/*.exe
          if-no-files-found: error
          retention-days: 14
