name: Windows desktop — build / release

# Two modes, one workflow (runs on a GitHub-hosted Windows machine — no local
# Windows needed):
#   • Manual (Actions → Run workflow): builds an UNSIGNED .exe and uploads it as
#     a downloadable artifact. Good for sending a test build to a friend.
#   • On a v* tag: builds AND publishes the installer + the electron-updater feed
#     (latest.yml + .exe + .blockmap) to the GitHub Release, so installed apps
#     auto-update. electron-builder creates a DRAFT release — review it, then
#     click "Publish release" to roll the update out.
#
# Still UNSIGNED (Windows SmartScreen "unrecognized app" cold-start applies).
# Code signing + the macOS build are Phase 4 — see docs/desktop-distribution.md.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # electron-builder needs this to create/update the Release on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The daemon's native wheels are platform-specific, so the freeze MUST run
      # on Windows. Pin Python to match requires-python.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Freeze the local-agent daemon (Windows, PyInstaller onedir)
        working-directory: local-host/python
        run: |
          uv sync
          uv run pyinstaller shejane-local-host.spec --noconfirm --clean

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build the renderer (→ prod API)
        working-directory: client
        run: |
          npm ci
          npm run build:desktop

      - name: Package + (on a tag) publish the Windows installer
        working-directory: client
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned build
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx electron-builder --win --publish always
          else
            npx electron-builder --win --publish never
          fi

      - name: Upload installer artifact (manual builds)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: shejane-windows-installer
          path: |
            client/release/*.exe
          if-no-files-found: error
          retention-days: 14
