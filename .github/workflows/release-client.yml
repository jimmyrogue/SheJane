  linux-arm64-media-worker:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build reproducible Linux arm64 Media Foundation Worker
        shell: bash
        run: |
          set -euo pipefail
          worker="${RUNNER_TEMP}/media-foundation-worker"
          bash runtime/plugins/media-foundation/build_worker_linux_arm64.sh "${worker}"
          tar --sort=name --mtime='@1784160000' --owner=0 --group=0 --numeric-owner \
            -C "${RUNNER_TEMP}" -cf - media-foundation-worker \
            | gzip -n > "${RUNNER_TEMP}/media-foundation-worker-linux-arm64.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: media-foundation-worker-linux-arm64
          path: ${{ runner.temp }}/media-foundation-worker-linux-arm64.tar.gz
          if-no-files-found: error

  linux-arm64-ocr-worker:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build reproducible Linux arm64 OCR Worker
        shell: bash
        run: |
          set -euo pipefail
          worker="${RUNNER_TEMP}/ocr-worker"
          bash runtime/plugins/ocr/build_worker_linux_arm64.sh "${worker}"
          tar --sort=name --mtime='@1784160000' --owner=0 --group=0 --numeric-owner \
            -C "${RUNNER_TEMP}" -cf - ocr-worker \
            | gzip -n > "${RUNNER_TEMP}/ocr-worker-linux-arm64.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-worker-linux-arm64
          path: ${{ runner.temp }}/ocr-worker-linux-arm64.tar.gz
          if-no-files-found: error

  linux-arm64-speech-worker:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build reproducible Linux arm64 Speech Worker
        shell: bash
        run: |
          set -euo pipefail
          worker="${RUNNER_TEMP}/speech-worker"
          bash runtime/plugins/speech/build_worker_linux_arm64.sh "${worker}"
          tar --sort=name --mtime='@1784160000' --owner=0 --group=0 --numeric-owner \
            -C "${RUNNER_TEMP}" -cf - speech-worker \
            | gzip -n > "${RUNNER_TEMP}/speech-worker-linux-arm64.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: speech-worker-linux-arm64
          path: ${{ runner.temp }}/speech-worker-linux-arm64.tar.gz
          if-no-files-found: error

  linux-arm64-vision-worker:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build reproducible Linux arm64 Vision Worker
        shell: bash
        run: |
          set -euo pipefail
          worker="${RUNNER_TEMP}/vision-worker"
          bash runtime/plugins/vision/build_worker_linux_arm64.sh "${worker}"
          tar --sort=name --mtime='@1784160000' --owner=0 --group=0 --numeric-owner \
            -C "${RUNNER_TEMP}" -cf - vision-worker \
            | gzip -n > "${RUNNER_TEMP}/vision-worker-linux-arm64.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: vision-worker-linux-arm64
          path: ${{ runner.temp }}/vision-worker-linux-arm64.tar.gz
          if-no-files-found: error

  guest-rootfs:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch locked guest rootfs build inputs
        shell: bash
        run: |
          set -euo pipefail
          lock="client/vm-assets/darwin-arm64.lock.json"
          inputs="${RUNNER_TEMP}/shejane-guest-rootfs-inputs"
          mkdir -p "${inputs}"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.e2fsprogs.source.url' e2fsprogs.tar.xz
          fetch '.e2fsprogs.signature.url' e2fsprogs.tar.sign
          fetch '.e2fsprogs.signing_key.url' e2fsprogs-signing-key.asc
          mkdir "${inputs}/runtime-packages"
          while IFS=$'\t' read -r url filename; do
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "${url}" --output "${inputs}/runtime-packages/${filename}"
          done < <(jq -r '.rootfs.runtime_packages[] | [.url, .filename] | @tsv' "${lock}")
      - name: Build reproducible Linux arm64 guest rootfs
        shell: bash
        run: |
          set -euo pipefail
          inputs="${RUNNER_TEMP}/shejane-guest-rootfs-inputs"
          python client/vm-assets/build_guest_rootfs.py \
            --e2fs-source "${inputs}/e2fsprogs.tar.xz" \
            --e2fs-signature "${inputs}/e2fsprogs.tar.sign" \
            --e2fs-signing-key "${inputs}/e2fsprogs-signing-key.asc" \
            --runtime-packages "${inputs}/runtime-packages" \
            --output "${RUNNER_TEMP}/guest-rootfs.ext4"
      - uses: actions/upload-artifact@v4
        with:
          name: managed-worker-guest-rootfs-arm64
          path: ${{ runner.temp }}/guest-rootfs.ext4
          if-no-files-found: error

  build:
    needs:
      - guest-rootfs
      - linux-arm64-documents-worker
      - linux-arm64-ffmpeg-runtime
      - linux-arm64-media-worker
      - linux-arm64-node-runtime
      - linux-arm64-ocr-runtime
      - linux-arm64-ocr-worker
      - linux-arm64-office-runtime
      - linux-arm64-pdf-runtime
      - linux-arm64-pdf-worker
      - linux-arm64-presentations-worker
      - linux-arm64-speech-runtime
      - linux-arm64-speech-worker
      - linux-arm64-spreadsheets-worker
      - linux-arm64-vision-worker
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macos
            arch: arm64
            target: mac
          - runner: windows-latest
            platform: windows
            arch: x64
            target: win
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: pnpm install --frozen-lockfile
      - name: Build Runtime
        working-directory: runtime
        run: |
          uv sync --frozen
          uv run python -m PyInstaller shejane-runtime.spec --noconfirm --clean
      - name: Set Client version
        if: github.ref_type == 'tag'
        working-directory: client
        shell: bash
        run: pnpm version "${GITHUB_REF_NAME#client-v}" --no-git-tag-version --allow-same-version
      - name: Configure macOS release signing
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          configured=0
          total=0
          for name in \
            MACOS_DEVELOPER_ID_P12_BASE64 \
            MACOS_DEVELOPER_ID_P12_PASSWORD \
            APPLE_API_KEY \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER \
            APPLE_TEAM_ID
          do
            total=$((total + 1))
            [[ -n "${!name}" ]] && configured=$((configured + 1))
          done
          if (( configured == total )); then
            echo "SHEJANE_MACOS_SIGNING_ENABLED=true" >> "${GITHUB_ENV}"
          elif (( configured == 0 )); then
            echo "SHEJANE_MACOS_SIGNING_ENABLED=false" >> "${GITHUB_ENV}"
            echo "SHEJANE_CODESIGN_IDENTITY=-" >> "${GITHUB_ENV}"
            echo "::warning::Apple release secrets are absent; producing an ad-hoc signed, unnotarized macOS artifact."
          else
            echo "macOS release secrets are only partially configured" >&2
            exit 1
          fi
      - name: Import macOS Developer ID certificate
        if: matrix.platform == 'macos' && env.SHEJANE_MACOS_SIGNING_ENABLED == 'true'
        shell: bash
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          certificate="${RUNNER_TEMP}/shejane-developer-id.p12"
          keychain="${RUNNER_TEMP}/shejane-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"
          printf '%s' "${MACOS_DEVELOPER_ID_P12_BASE64}" | base64 --decode > "${certificate}"
          chmod 600 "${certificate}"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${certificate}" -k "${keychain}" \
            -P "${MACOS_DEVELOPER_ID_P12_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "${keychain_password}" "${keychain}"
          security list-keychains -d user -s "${keychain}"
          identity="$(security find-identity -v -p codesigning "${keychain}" \
            | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' \
            | head -1)"
          test -n "${identity}" || { echo "Developer ID Application identity is unavailable" >&2; exit 1; }
          rm -f "${certificate}"
          echo "SHEJANE_CODESIGN_IDENTITY=${identity}" >> "${GITHUB_ENV}"
          echo "APPLE_TEAM_ID=${APPLE_TEAM_ID}" >> "${GITHUB_ENV}"
      - name: Prepare unsupported macOS VM asset directory
        if: matrix.platform == 'macos' && matrix.arch != 'arm64'
        run: mkdir -p client/build/vm-assets-${{ matrix.arch }}
      - name: Fetch locked macOS Managed Worker VM sources
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          lock="client/vm-assets/darwin-arm64.lock.json"
          inputs="${RUNNER_TEMP}/shejane-managed-worker-vm-inputs"
          mkdir -p "${inputs}"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.fedora.kernel_core.url' kernel-core.rpm
          fetch '.fedora.kernel_modules_core.url' kernel-modules-core.rpm
          fetch '.fedora.kernel_srpm.url' kernel.src.rpm
          fetch '.fedora.keyring.url' fedora.gpg
          fetch '.e2fsprogs.source.url' e2fsprogs.tar.xz
          fetch '.e2fsprogs.signature.url' e2fsprogs.tar.sign
          fetch '.e2fsprogs.signing_key.url' e2fsprogs-signing-key.asc
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: managed-worker-guest-rootfs-arm64
          path: ${{ runner.temp }}/shejane-managed-worker-vm-inputs
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: documents-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-documents-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: spreadsheets-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-spreadsheets-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: presentations-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-presentations-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: pdf-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-pdf-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: media-foundation-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-media-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: ocr-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-ocr-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: speech-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-speech-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: vision-worker-linux-arm64
          path: ${{ runner.temp }}/shejane-vision-worker
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: office-runtime-linux-arm64
          path: ${{ runner.temp }}/shejane-office-runtime
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: mupdf-runtime-linux-arm64
          path: ${{ runner.temp }}/shejane-mupdf-runtime
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: ffmpeg-runtime-linux-arm64
          path: ${{ runner.temp }}/shejane-ffmpeg-runtime
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: rapidocr-runtime-linux-arm64
          path: ${{ runner.temp }}/shejane-rapidocr-runtime
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: whisper-runtime-linux-arm64
          path: ${{ runner.temp }}/shejane-whisper-runtime
      - uses: actions/download-artifact@v4
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        with:
          name: node-runtime-linux-arm64
          path: ${{ runner.temp }}/shejane-node-runtime
      - name: Extract Linux arm64 Managed Workers
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf "${RUNNER_TEMP}/shejane-documents-worker/documents-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-documents-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-spreadsheets-worker/spreadsheets-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-spreadsheets-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-presentations-worker/presentations-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-presentations-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-pdf-worker/pdf-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-pdf-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-media-worker/media-foundation-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-media-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-ocr-worker/ocr-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-ocr-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-speech-worker/speech-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-speech-worker"
          tar -xzf "${RUNNER_TEMP}/shejane-vision-worker/vision-worker-linux-arm64.tar.gz" \
            -C "${RUNNER_TEMP}/shejane-vision-worker"
          test -x "${RUNNER_TEMP}/shejane-documents-worker/documents-worker/documents-worker"
          test -x "${RUNNER_TEMP}/shejane-spreadsheets-worker/spreadsheets-worker/spreadsheets-worker"
          test -x "${RUNNER_TEMP}/shejane-presentations-worker/presentations-worker/presentations-worker"
          test -x "${RUNNER_TEMP}/shejane-pdf-worker/pdf-worker/pdf-worker"
          test -x "${RUNNER_TEMP}/shejane-media-worker/media-foundation-worker/media-foundation-worker"
          test -x "${RUNNER_TEMP}/shejane-ocr-worker/ocr-worker/ocr-worker"
          test -x "${RUNNER_TEMP}/shejane-speech-worker/speech-worker/speech-worker"
          test -x "${RUNNER_TEMP}/shejane-vision-worker/vision-worker/vision-worker"
      - name: Install verified Linux arm64 Office Runtime Asset
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          from pathlib import Path
          from shejane_runtime.plugins.runtime_assets import RuntimeAssetStore

          root = Path("${{ runner.temp }}")
          archive = root / "shejane-office-runtime/office-runtime-linux-arm64-a.shejane-runtime-asset"
          installed = RuntimeAssetStore(root / "shejane-office-runtime-store").install(archive)
          (root / "shejane-office-runtime-path").write_text(str(installed.root), encoding="utf-8")
          (root / "shejane-office-runtime-digest").write_text(installed.digest, encoding="utf-8")
          PY
      - name: Install verified Linux arm64 MuPDF Runtime Asset
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          from pathlib import Path
          from shejane_runtime.plugins.runtime_assets import RuntimeAssetStore

          root = Path("${{ runner.temp }}")
          archive = root / "shejane-mupdf-runtime/mupdf-runtime-linux-arm64-a.shejane-runtime-asset"
          installed = RuntimeAssetStore(root / "shejane-mupdf-runtime-store").install(archive)
          (root / "shejane-mupdf-runtime-digest").write_text(installed.digest, encoding="utf-8")
          PY
      - name: Install verified Linux arm64 media Runtime Assets
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          from pathlib import Path
          from shejane_runtime.plugins.runtime_assets import RuntimeAssetStore

          root = Path("${{ runner.temp }}")
          assets = {
              "ffmpeg": root / "shejane-ffmpeg-runtime/ffmpeg-runtime-linux-arm64-a.shejane-runtime-asset",
              "rapidocr": root / "shejane-rapidocr-runtime/rapidocr-runtime-linux-arm64-a.shejane-runtime-asset",
              "whisper": root / "shejane-whisper-runtime/whisper-runtime-linux-arm64-a.shejane-runtime-asset",
          }
          store = RuntimeAssetStore(root / "shejane-media-runtime-store")
          for name, archive in assets.items():
              installed = store.install(archive)
              (root / f"shejane-{name}-runtime-digest").write_text(
                  installed.digest, encoding="utf-8"
              )
          PY
      - name: Build and inspect Linux arm64 Office plugin packages
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          digest="$(cat "${RUNNER_TEMP}/shejane-office-runtime-digest")"
          packages="${RUNNER_TEMP}/shejane-office-packages"
          mkdir -p "${packages}"
          uv run python plugins/office/documents/build_package.py \
            --platform linux/arm64 \
            --runtime-asset-digest "${digest}" \
            --worker "${RUNNER_TEMP}/shejane-documents-worker/documents-worker" \
            --output "${packages}/documents-0.1.0-linux-arm64.shejane-plugin"
          uv run python plugins/office/spreadsheets/build_package.py \
            --platform linux/arm64 \
            --runtime-asset-digest "${digest}" \
            --worker "${RUNNER_TEMP}/shejane-spreadsheets-worker/spreadsheets-worker" \
            --output "${packages}/spreadsheets-0.1.0-linux-arm64.shejane-plugin"
          uv run python plugins/office/presentations/build_package.py \
            --platform linux/arm64 \
            --runtime-asset-digest "${digest}" \
            --worker "${RUNNER_TEMP}/shejane-presentations-worker/presentations-worker" \
            --output "${packages}/presentations-0.1.0-linux-arm64.shejane-plugin"
          for package in "${packages}"/*.shejane-plugin; do
            uv run shejane-plugin inspect "${package}"
          done
      - name: Build and inspect Linux arm64 PDF plugin package
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          digest="$(cat "${RUNNER_TEMP}/shejane-mupdf-runtime-digest")"
          output="${RUNNER_TEMP}/shejane-pdf-0.1.0-linux-arm64.shejane-plugin"
          uv run python plugins/pdf/build_package.py \
            --platform linux/arm64 \
            --runtime-asset-digest "${digest}" \
            --worker "${RUNNER_TEMP}/shejane-pdf-worker/pdf-worker" \
            --output "${output}"
          uv run shejane-plugin inspect "${output}"
      - name: Build and inspect Linux arm64 Media, OCR, Speech, and Cloud Vision packages
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          packages="${RUNNER_TEMP}/shejane-media-packages"
          mkdir -p "${packages}"
          ffmpeg_digest="$(cat "${RUNNER_TEMP}/shejane-ffmpeg-runtime-digest")"
          rapidocr_digest="$(cat "${RUNNER_TEMP}/shejane-rapidocr-runtime-digest")"
          whisper_digest="$(cat "${RUNNER_TEMP}/shejane-whisper-runtime-digest")"
          uv run python plugins/media-foundation/build_package.py \
            --platform linux/arm64 \
            --runtime-asset-digest "${ffmpeg_digest}" \
            --worker "${RUNNER_TEMP}/shejane-media-worker/media-foundation-worker" \
            --output "${packages}/media-foundation-0.1.0-linux-arm64.shejane-plugin"
          uv run python plugins/ocr/build_package.py \
            --platform linux/arm64 \
            --runtime-asset-digest "${rapidocr_digest}" \
            --worker "${RUNNER_TEMP}/shejane-ocr-worker/ocr-worker" \
            --output "${packages}/ocr-0.1.0-linux-arm64.shejane-plugin"
          uv run python plugins/speech/build_package.py \
            --platform linux/arm64 \
            --ffmpeg-runtime-asset-digest "${ffmpeg_digest}" \
            --whisper-runtime-asset-digest "${whisper_digest}" \
            --worker "${RUNNER_TEMP}/shejane-speech-worker/speech-worker" \
            --output "${packages}/speech-0.1.0-linux-arm64.shejane-plugin"
          uv run python plugins/vision/build_package.py \
            --backend cloud \
            --platform linux/arm64 \
            --worker "${RUNNER_TEMP}/shejane-vision-worker/vision-worker" \
            --output "${packages}/vision-cloud-0.1.0-linux-arm64.shejane-plugin"
          for package in "${packages}"/*.shejane-plugin; do
            uv run shejane-plugin inspect "${package}"
          done
      - name: Build locked macOS Managed Worker VM assets
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          brew install gnupg rpm zstd
          inputs="${RUNNER_TEMP}/shejane-managed-worker-vm-inputs"
          uv run python ../client/vm-assets/build_darwin.py \
            --kernel-core "${inputs}/kernel-core.rpm" \
            --kernel-modules-core "${inputs}/kernel-modules-core.rpm" \
            --kernel-srpm "${inputs}/kernel.src.rpm" \
            --fedora-keyring "${inputs}/fedora.gpg" \
            --e2fs-source "${inputs}/e2fsprogs.tar.xz" \
            --e2fs-signature "${inputs}/e2fsprogs.tar.sign" \
            --e2fs-signing-key "${inputs}/e2fsprogs-signing-key.asc" \
            --guest-rootfs "${inputs}/guest-rootfs.ext4" \
            --codesign-identity "${SHEJANE_CODESIGN_IDENTITY}" \
            --output ../client/build/vm-assets-arm64
      - name: Package Client
        working-directory: client
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          pnpm build:client
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            if [[ "${SHEJANE_MACOS_SIGNING_ENABLED}" == "true" ]]; then
              export CSC_IDENTITY_AUTO_DISCOVERY=true
              pnpm exec electron-builder --${{ matrix.target }} --${{ matrix.arch }} \
                --config.mac.identity="${SHEJANE_CODESIGN_IDENTITY}" --publish never
            else
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              pnpm exec electron-builder --${{ matrix.target }} --${{ matrix.arch }} \
                --config.mac.identity=- \
                --config.mac.hardenedRuntime=false \
                --config.mac.notarize=false \
                --publish never
            fi
          else
            pnpm exec electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never
          fi
      - name: Verify packaged macOS application
        if: matrix.platform == 'macos'
        working-directory: client
        shell: bash
        run: |
          set -euo pipefail
          app="$(find release -type d -name '*.app' -print -quit)"
          codesign --verify --deep --strict --verbose=2 "${app}"
          dmg="$(find release -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "${dmg}"
          if [[ "${SHEJANE_MACOS_SIGNING_ENABLED}" == "true" ]]; then
            codesign -d --verbose=4 "${app}" 2>&1 \
              | grep -Fq "TeamIdentifier=${APPLE_TEAM_ID}"
            codesign -d --verbose=4 "${app}" 2>&1 | grep -Eq 'flags=.*runtime'
            codesign -d --verbose=4 "${app}" 2>&1 | grep -Fq 'Authority=Developer ID Application:'
            codesign -d --verbose=4 "${app}" 2>&1 | grep -Fq 'Timestamp='
            spctl --assess --type execute --verbose=4 "${app}"
            xcrun stapler validate "${app}"
            xcrun stapler validate "${dmg}"
            spctl --assess --type open --context context:primary-signature --verbose=4 "${dmg}"
          else
            codesign -d --verbose=4 "${app}" 2>&1 | grep -Fq 'Signature=adhoc'
          fi
          if [[ "${{ matrix.arch }}" != "arm64" ]]; then
            test ! -e "${app}/Contents/Resources/sandbox/vm-assets/manifest.json"
            exit 0
          fi
          assets="${app}/Contents/Resources/sandbox/vm-assets"
          helper="${assets}/shejane-managed-worker-vm"
          diff -rq build/vm-assets-arm64 "${assets}"
          for executable in "${helper}" "${assets}/mke2fs"; do
            codesign --verify --strict --verbose=2 "${executable}"
            if [[ "${SHEJANE_MACOS_SIGNING_ENABLED}" == "true" ]]; then
              codesign -d --verbose=4 "${executable}" 2>&1 | grep -Eq 'flags=.*runtime'
              codesign -d --verbose=4 "${executable}" 2>&1 \
                | grep -Fq 'Authority=Developer ID Application:'
              codesign -d --verbose=4 "${executable}" 2>&1 | grep -Fq 'Timestamp='
            else
              codesign -d --verbose=4 "${executable}" 2>&1 | grep -Fq 'Signature=adhoc'
            fi
          done
          codesign -d --entitlements - "${helper}" 2>&1 \
            | grep -Fq 'com.apple.security.virtualization'
          "${helper}" --self-test
          "${assets}/mke2fs" -V 2>&1 | grep -Fq 'mke2fs 1.47.2'
      - name: Run packaged Client Runtime smoke
        if: matrix.platform == 'macos' || matrix.platform == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            packaged="$(find client/release -type d -name '*.app' -print -quit)"
          else
            packaged="$(find client/release/win-unpacked -maxdepth 1 -type f -name '*.exe' -print -quit)"
          fi
          test -n "${packaged}"
          node scripts/test-packaged-client-runtime.mjs "${packaged}"
      - name: Run packaged macOS Managed Worker VM gate
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          assets="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)"
          manifest="${assets}/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_LINUX_DOCUMENTS_WORKER="${RUNNER_TEMP}/shejane-documents-worker/documents-worker" \
          SHEJANE_TEST_NODE_RUNTIME_ASSET="${RUNNER_TEMP}/shejane-node-runtime/org.nodejs.runtime-linux-arm64-a.shejane-runtime-asset" \
            uv run pytest tests/test_macos_managed_worker_vm_gate.py -q
      - name: Run Linux arm64 Office Worker golden gate in packaged macOS VM
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          manifest="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_DOCUMENTS_WORKER="${RUNNER_TEMP}/shejane-documents-worker/documents-worker/documents-worker" \
          SHEJANE_TEST_SPREADSHEETS_WORKER="${RUNNER_TEMP}/shejane-spreadsheets-worker/spreadsheets-worker/spreadsheets-worker" \
          SHEJANE_TEST_PRESENTATIONS_WORKER="${RUNNER_TEMP}/shejane-presentations-worker/presentations-worker/presentations-worker" \
          SHEJANE_TEST_OFFICE_RUNTIME="$(cat "${RUNNER_TEMP}/shejane-office-runtime-path")" \
            uv run pytest \
              tests/test_documents_worker.py::test_documents_worker_real_runtime_asset_render \
              tests/test_spreadsheets_worker.py::test_spreadsheets_worker_real_runtime_recalculation_and_golden \
              tests/test_presentations_worker.py::test_presentations_worker_real_runtime_render_golden \
              -q
      - name: Run Linux arm64 PDF production gate in packaged macOS VM
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          manifest="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_PDF_WORKER="${RUNNER_TEMP}/shejane-pdf-worker/pdf-worker/pdf-worker" \
          SHEJANE_MUPDF_RUNTIME_ASSET="${RUNNER_TEMP}/shejane-mupdf-runtime/mupdf-runtime-linux-arm64-a.shejane-runtime-asset" \
            uv run pytest tests/test_pdf_runtime_asset.py -q
      - name: Run Linux arm64 Media Foundation production gate in packaged macOS VM
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          manifest="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_MEDIA_WORKER="${RUNNER_TEMP}/shejane-media-worker/media-foundation-worker/media-foundation-worker" \
          SHEJANE_FFMPEG_RUNTIME_ASSET="${RUNNER_TEMP}/shejane-ffmpeg-runtime/ffmpeg-runtime-linux-arm64-a.shejane-runtime-asset" \
            uv run pytest tests/test_media_foundation_runtime_asset.py -q
      - name: Run Linux arm64 OCR production gate in packaged macOS VM
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          manifest="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_OCR_WORKER="${RUNNER_TEMP}/shejane-ocr-worker/ocr-worker/ocr-worker" \
          SHEJANE_RAPIDOCR_RUNTIME_ASSET="${RUNNER_TEMP}/shejane-rapidocr-runtime/rapidocr-runtime-linux-arm64-a.shejane-runtime-asset" \
            uv run pytest tests/test_ocr_runtime_asset.py -q
      - name: Run Linux arm64 Speech production gate in packaged macOS VM
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          manifest="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_SPEECH_WORKER="${RUNNER_TEMP}/shejane-speech-worker/speech-worker/speech-worker" \
          SHEJANE_TEST_MEDIA_WORKER="${RUNNER_TEMP}/shejane-media-worker/media-foundation-worker/media-foundation-worker" \
          SHEJANE_FFMPEG_RUNTIME_ASSET="${RUNNER_TEMP}/shejane-ffmpeg-runtime/ffmpeg-runtime-linux-arm64-a.shejane-runtime-asset" \
          SHEJANE_WHISPER_RUNTIME_ASSET="${RUNNER_TEMP}/shejane-whisper-runtime/whisper-runtime-linux-arm64-a.shejane-runtime-asset" \
            uv run pytest tests/test_speech_runtime_asset.py -q
      - name: Run Linux arm64 Cloud Vision broker gate in packaged macOS VM
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        working-directory: runtime
        shell: bash
        run: |
          set -euo pipefail
          app="$(find ../client/release -type d -name '*.app' -print -quit)"
          manifest="$(cd "${app}/Contents/Resources/sandbox/vm-assets" && pwd)/manifest.json"
          SHEJANE_TEST_MACOS_VM_ASSETS="${manifest}" \
          SHEJANE_TEST_VISION_WORKER="${RUNNER_TEMP}/shejane-vision-worker/vision-worker/vision-worker" \
            uv run pytest \
              tests/test_vision_worker.py::test_cloud_vision_worker_uses_frozen_host_binding_without_asset \
              tests/test_plugin_tool_execution.py::test_vision_provider_call_uses_authorized_image_and_redacts_credentials \
              -q
      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            client/release/*.dmg
            client/release/*.zip
            client/release/*.exe
            client/release/latest*.yml
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: client-*
          path: release
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
