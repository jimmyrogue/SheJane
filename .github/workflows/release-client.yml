name: Release Client

on:
  push:
    tags: ["client-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-arm64-runtime:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
      - name: Install Linux Runtime build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes binutils
      - name: Fetch and build verified bubblewrap
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/native/managed-worker-linux/bubblewrap-0.11.2.lock.json"
          source="${RUNNER_TEMP}/bubblewrap-0.11.2.tar.xz"
          curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
            "$(jq -r '.source.url' "${lock}")" --output "${source}"
          python - "${source}" "${lock}" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          raw = Path(sys.argv[1]).read_bytes()
          expected = json.loads(Path(sys.argv[2]).read_text())["source"]
          assert len(raw) == expected["size_bytes"]
          assert hashlib.sha256(raw).hexdigest() == expected["sha256"]
          PY
          output="${PWD}/runtime/build/managed-worker-linux/bubblewrap"
          mkdir -p "${output}"
          docker run --rm \
            -v "${PWD}:/workspace:ro" \
            -v "${source}:/inputs/bubblewrap.tar.xz:ro" \
            -v "${output}:/output" \
            debian@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818 \
            sh -euc '
              apt-get update -qq
              apt-get install -y -qq gcc libcap-dev meson ninja-build pkg-config python3 xz-utils
              /workspace/scripts/build-linux-bubblewrap.sh \
                /inputs/bubblewrap.tar.xz /output
            '
      - name: Build packaged Linux arm64 Runtime
        run: make package-runtime
      - name: Verify packaged Runtime and cgroup launcher
        shell: bash
        run: |
          set -euo pipefail
          runtime="runtime/dist/shejane-runtime/shejane-runtime"
          launcher="$(find runtime/dist/shejane-runtime -type f \
            -name shejane-managed-worker-linux -print -quit)"
          bubblewrap="$(find runtime/dist/shejane-runtime -type f \
            -name shejane-bwrap -print -quit)"
          test -x "${runtime}"
          test -x "${launcher}"
          test -x "${bubblewrap}"
          test -f "$(dirname "${bubblewrap}")/libcap.so.2"
          "${runtime}" --help >/dev/null
          "${launcher}" --help >/dev/null
          "${bubblewrap}" --version | grep -Fx 'bubblewrap 0.11.2'
          printf '%s' "${launcher}" > "${RUNNER_TEMP}/shejane-linux-launcher-path"
          printf '%s' "${bubblewrap}" > "${RUNNER_TEMP}/shejane-linux-bubblewrap-path"
      - name: Build Linux native sandbox fixture
        shell: bash
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath -buildvcs=false -ldflags='-s -w -buildid=' \
            -o "${RUNNER_TEMP}/shejane-linux-sandbox-worker" \
            runtime/tests/fixtures/managed_worker_linux/main.go
      - name: Run packaged Linux cgroup v2 Gate
        shell: bash
        run: |
          set -euo pipefail
          launcher="$(cat "${RUNNER_TEMP}/shejane-linux-launcher-path")"
          bubblewrap="$(cat "${RUNNER_TEMP}/shejane-linux-bubblewrap-path")"
          bubblewrap_dir="$(dirname "${bubblewrap}")"
          image="python:3.12.10-slim-bookworm@sha256:79082fdf411b897d64983893f44e8e1908e21cade2fc5a794d4f46de76c85275"
          docker run --rm --privileged --cgroupns=host \
            -v "${PWD}:/workspace:ro" \
            -v "${PWD}/${launcher}:/launcher:ro" \
            -v "${PWD}/${bubblewrap_dir}:/managed-worker-linux:ro" \
            -v "${RUNNER_TEMP}/shejane-linux-sandbox-worker:/sandbox-worker:ro" \
            -e PYTHONPATH=/workspace/runtime/src \
            -e SHEJANE_TEST_LINUX_CGROUP_LAUNCHER=/launcher \
            -e SHEJANE_TEST_LINUX_CGROUP_ROOT=/sys/fs/cgroup \
            -e SHEJANE_TEST_LINUX_BUBBLEWRAP=/managed-worker-linux/shejane-bwrap \
            -e SHEJANE_TEST_LINUX_SANDBOX_WORKER=/sandbox-worker \
            "${image}" sh -eu -c '
              cd /tmp
              pip install --disable-pip-version-check --no-cache-dir -q \
                pytest==9.0.3 pytest-asyncio==1.3.0 wasmtime==46.0.1
              cd /workspace/runtime
              pytest -q --noconftest -p no:cacheprovider \
                tests/test_managed_worker_linux.py
            '
      - name: Run packaged Linux systemd delegation Gate
        shell: bash
        run: |
          set -euo pipefail
          manifest="$(find runtime/dist/shejane-runtime -type f \
            -path '*/managed-worker-linux/manifest.json' -print -quit)"
          python="$(cd runtime && uv run which python)"
          test -f "${manifest}"
          sudo systemd-run --quiet --wait --pipe --collect --service-type=exec \
            --property=Delegate=yes \
            --property=DelegateSubgroup=supervisor \
            --working-directory="${PWD}/runtime" \
            /usr/bin/env \
              "PYTHONPATH=${PWD}/runtime/src" \
              "SHEJANE_TEST_LINUX_ASSET_MANIFEST=${PWD}/${manifest}" \
              "SHEJANE_TEST_LINUX_SANDBOX_WORKER=${RUNNER_TEMP}/shejane-linux-sandbox-worker" \
              "${python}" -m pytest -q --noconftest -p no:cacheprovider \
                tests/test_managed_worker_linux.py
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-linux-arm64
          path: runtime/dist/shejane-runtime
          if-no-files-found: error

  linux-arm64-node-runtime:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch locked Node.js runtime inputs
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/plugins/runtime-assets/node/node-24.18.0-linux-arm64.lock.json"
          inputs="${RUNNER_TEMP}/shejane-node-runtime-inputs"
          mkdir -p "${inputs}"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.node.url' node.tar.xz
          fetch '.signed_checksums.url' SHASUMS256.txt.asc
          fetch '.release_keyring.url' pubring.kbx
      - name: Build reproducible Linux arm64 Node.js Runtime Asset
        shell: bash
        run: |
          set -euo pipefail
          inputs="${RUNNER_TEMP}/shejane-node-runtime-inputs"
          first="${RUNNER_TEMP}/org.nodejs.runtime-linux-arm64-a.shejane-runtime-asset"
          second="${RUNNER_TEMP}/org.nodejs.runtime-linux-arm64-b.shejane-runtime-asset"
          for output in "${first}" "${second}"; do
            python runtime/plugins/runtime-assets/node/build_linux_arm64.py \
              --node-archive "${inputs}/node.tar.xz" \
              --signed-checksums "${inputs}/SHASUMS256.txt.asc" \
              --release-keyring "${inputs}/pubring.kbx" \
              --output "${output}"
          done
          cmp "${first}" "${second}"
          mkdir "${RUNNER_TEMP}/node-runtime-probe"
          unzip -q "${first}" -d "${RUNNER_TEMP}/node-runtime-probe"
          test "$("${RUNNER_TEMP}/node-runtime-probe/payload/bin/node" --version)" = "v24.18.0"
      - uses: actions/upload-artifact@v4
        with:
          name: node-runtime-linux-arm64
          path: ${{ runner.temp }}/org.nodejs.runtime-linux-arm64-a.shejane-runtime-asset
          if-no-files-found: error

  linux-arm64-office-runtime:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch locked Office Runtime inputs
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/plugins/office/runtime-assets/libreoffice-25.8.7.lock.json"
          inputs="${RUNNER_TEMP}/shejane-office-runtime-inputs"
          mkdir -p "${inputs}"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.libreoffice.platforms["linux/arm64"].url' libreoffice.tar.gz
          fetch '.libreoffice.platforms["linux/arm64"].signature.url' libreoffice.tar.gz.asc
          fetch '.pdf_renderer.source_url' mupdf-source.tar.gz
          fetch '.font_baseline.url' noto-cjk.zip
      - name: Build reproducible Linux arm64 Office Runtime Asset
        shell: bash
        run: |
          set -euo pipefail
          inputs="${RUNNER_TEMP}/shejane-office-runtime-inputs"
          first="${RUNNER_TEMP}/office-runtime-linux-arm64-a.shejane-runtime-asset"
          second="${RUNNER_TEMP}/office-runtime-linux-arm64-b.shejane-runtime-asset"
          for output in "${first}" "${second}"; do
            python runtime/plugins/office/runtime-assets/build_linux_arm64.py \
              --libreoffice-archive "${inputs}/libreoffice.tar.gz" \
              --libreoffice-signature "${inputs}/libreoffice.tar.gz.asc" \
              --mupdf-source "${inputs}/mupdf-source.tar.gz" \
              --noto-cjk "${inputs}/noto-cjk.zip" \
              --output "${output}"
          done
          cmp "${first}" "${second}"
      - uses: actions/upload-artifact@v4
        with:
          name: office-runtime-linux-arm64
          path: ${{ runner.temp }}/office-runtime-linux-arm64-a.shejane-runtime-asset
          if-no-files-found: error

  linux-arm64-pdf-runtime:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch locked MuPDF Runtime source
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/plugins/pdf/runtime-assets/mupdf-1.27.2.lock.json"
          curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
            "$(jq -r '.upstream.source_url' "${lock}")" \
            --output "${RUNNER_TEMP}/mupdf-1.27.2-source.tar.gz"
      - name: Build reproducible Linux arm64 MuPDF Runtime Asset
        shell: bash
        run: |
          set -euo pipefail
          first="${RUNNER_TEMP}/mupdf-runtime-linux-arm64-a.shejane-runtime-asset"
          second="${RUNNER_TEMP}/mupdf-runtime-linux-arm64-b.shejane-runtime-asset"
          for output in "${first}" "${second}"; do
            python runtime/plugins/pdf/runtime-assets/build_linux_arm64.py \
              --source "${RUNNER_TEMP}/mupdf-1.27.2-source.tar.gz" \
              --output "${output}"
          done
          cmp "${first}" "${second}"
      - uses: actions/upload-artifact@v4
        with:
          name: mupdf-runtime-linux-arm64
          path: ${{ runner.temp }}/mupdf-runtime-linux-arm64-a.shejane-runtime-asset
          if-no-files-found: error

  linux-arm64-ffmpeg-runtime:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch authenticated FFmpeg Runtime source
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/plugins/media-foundation/runtime-assets/ffmpeg-8.1.2.lock.json"
          inputs="${RUNNER_TEMP}/shejane-ffmpeg-runtime-inputs"
          mkdir -p "${inputs}"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.upstream.source_url' ffmpeg-8.1.2.tar.xz
          fetch '.upstream.signature_url' ffmpeg-8.1.2.tar.xz.asc
          fetch '.upstream.signing_key_url' ffmpeg-devel.asc
      - name: Build reproducible Linux arm64 FFmpeg Runtime Asset
        shell: bash
        run: |
          set -euo pipefail
          inputs="${RUNNER_TEMP}/shejane-ffmpeg-runtime-inputs"
          first="${RUNNER_TEMP}/ffmpeg-runtime-linux-arm64-a.shejane-runtime-asset"
          second="${RUNNER_TEMP}/ffmpeg-runtime-linux-arm64-b.shejane-runtime-asset"
          for output in "${first}" "${second}"; do
            python runtime/plugins/media-foundation/runtime-assets/build_linux_arm64.py \
              --source "${inputs}/ffmpeg-8.1.2.tar.xz" \
              --signature "${inputs}/ffmpeg-8.1.2.tar.xz.asc" \
              --signing-key "${inputs}/ffmpeg-devel.asc" \
              --output "${output}"
          done
          cmp "${first}" "${second}"
      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-runtime-linux-arm64
          path: ${{ runner.temp }}/ffmpeg-runtime-linux-arm64-a.shejane-runtime-asset
          if-no-files-found: error

  linux-arm64-ocr-runtime:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch content-locked OCR packages and models
        shell: bash
        run: |
          set -euo pipefail
          wheelhouse="${RUNNER_TEMP}/shejane-ocr-wheelhouse"
          models="${RUNNER_TEMP}/shejane-ocr-models"
          mkdir -p "${wheelhouse}" "${models}"
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          root = Path.cwd()
          wheelhouse = Path(os.environ["RUNNER_TEMP"]) / "shejane-ocr-wheelhouse"
          lock = json.loads(
              (root / "runtime/plugins/ocr/runtime-assets/rapidocr-3.9.1-linux-arm64.lock.json").read_text()
          )
          for item in lock["packages"]:
              filename = item["filename"]
              project = (
                  "antlr4-python3-runtime"
                  if filename.startswith("antlr4-python3-runtime-")
                  else filename.split("-", 1)[0].replace("_", "-")
              )
              with urllib.request.urlopen(f"https://pypi.org/pypi/{project}/json") as response:
                  metadata = json.load(response)
              candidates = [
                  file
                  for release in metadata["releases"].values()
                  for file in release
                  if file["filename"] == filename
              ]
              if len(candidates) != 1:
                  raise SystemExit(f"locked PyPI file is unavailable: {filename}")
              urllib.request.urlretrieve(candidates[0]["url"], wheelhouse / filename)
          PY
          while IFS=$'\t' read -r url filename; do
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "${url}" --output "${models}/${filename}"
          done < <(jq -r '.models[] | [.source_url, .filename] | @tsv' \
            runtime/plugins/ocr/runtime-assets/rapidocr-3.9.1.lock.json)
      - name: Build reproducible Linux arm64 RapidOCR Runtime Asset
        shell: bash
        run: |
          set -euo pipefail
          first="${RUNNER_TEMP}/rapidocr-runtime-linux-arm64-a.shejane-runtime-asset"
          second="${RUNNER_TEMP}/rapidocr-runtime-linux-arm64-b.shejane-runtime-asset"
          for output in "${first}" "${second}"; do
            python runtime/plugins/ocr/runtime-assets/build_linux_arm64.py \
              --wheelhouse "${RUNNER_TEMP}/shejane-ocr-wheelhouse" \
              --model-dir "${RUNNER_TEMP}/shejane-ocr-models" \
              --output "${output}"
          done
          cmp "${first}" "${second}"
      - uses: actions/upload-artifact@v4
        with:
          name: rapidocr-runtime-linux-arm64
          path: ${{ runner.temp }}/rapidocr-runtime-linux-arm64-a.shejane-runtime-asset
          if-no-files-found: error

  darwin-arm64-speech-model:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
      - name: Fetch locked Whisper sources and checkpoint
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/plugins/speech/runtime-assets/whisper-1.8.6.lock.json"
          inputs="${RUNNER_TEMP}/shejane-speech-model-inputs"
          mkdir -p "${inputs}"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.whisper_cpp.source_url' whisper.cpp-v1.8.6.tar.gz
          fetch '.openai_whisper.source_url' openai-whisper-v20250625.tar.gz
          fetch '.checkpoint.source_url' large-v3-turbo.pt
      - name: Build canonical quantized Whisper model
        shell: bash
        run: |
          set -euo pipefail
          python -m venv "${RUNNER_TEMP}/shejane-speech-model-python"
          "${RUNNER_TEMP}/shejane-speech-model-python/bin/python" -m pip install \
            --disable-pip-version-check --require-hashes \
            -r runtime/plugins/speech/runtime-assets/model-requirements-darwin-arm64.lock
          inputs="${RUNNER_TEMP}/shejane-speech-model-inputs"
          PATH="${RUNNER_TEMP}/shejane-speech-model-python/bin:${PATH}" \
          python runtime/plugins/speech/runtime-assets/build_model_darwin.py \
            --whisper-source "${inputs}/whisper.cpp-v1.8.6.tar.gz" \
            --openai-source "${inputs}/openai-whisper-v20250625.tar.gz" \
            --checkpoint "${inputs}/large-v3-turbo.pt" \
            --python "${RUNNER_TEMP}/shejane-speech-model-python/bin/python" \
            --output "${RUNNER_TEMP}/ggml-large-v3-turbo-q5_0.bin"
      - uses: actions/upload-artifact@v4
        with:
          name: whisper-model-q5-0
          path: ${{ runner.temp }}/ggml-large-v3-turbo-q5_0.bin
          if-no-files-found: error

  linux-arm64-speech-runtime:
    needs: darwin-arm64-speech-model
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: whisper-model-q5-0
          path: ${{ runner.temp }}/shejane-speech-runtime-inputs
      - name: Fetch locked Whisper sources and checkpoint
        shell: bash
        run: |
          set -euo pipefail
          lock="runtime/plugins/speech/runtime-assets/whisper-1.8.6.lock.json"
          inputs="${RUNNER_TEMP}/shejane-speech-runtime-inputs"
          fetch() {
            local query="$1"
            local output="$2"
            curl --fail --location --retry 5 --proto '=https' --proto-redir '=https' --tlsv1.2 \
              "$(jq -r "${query}" "${lock}")" --output "${inputs}/${output}"
          }
          fetch '.whisper_cpp.source_url' whisper.cpp-v1.8.6.tar.gz
          fetch '.openai_whisper.source_url' openai-whisper-v20250625.tar.gz
          fetch '.checkpoint.source_url' large-v3-turbo.pt
      - name: Build reproducible Linux arm64 Whisper Runtime Asset
        shell: bash
        run: |
          set -euo pipefail
          inputs="${RUNNER_TEMP}/shejane-speech-runtime-inputs"
          first="${RUNNER_TEMP}/whisper-runtime-linux-arm64-a.shejane-runtime-asset"
          second="${RUNNER_TEMP}/whisper-runtime-linux-arm64-b.shejane-runtime-asset"
          for output in "${first}" "${second}"; do
            python runtime/plugins/speech/runtime-assets/build_linux_arm64.py \
              --whisper-source "${inputs}/whisper.cpp-v1.8.6.tar.gz" \
              --openai-source "${inputs}/openai-whisper-v20250625.tar.gz" \
              --checkpoint "${inputs}/large-v3-turbo.pt" \
              --model "${inputs}/ggml-large-v3-turbo-q5_0.bin" \
              --output "${output}"
          done
          cmp "${first}" "${second}"
      - uses: actions/upload-artifact@v4
        with:
          name: whisper-runtime-linux-arm64
          path: ${{ runner.temp }}/whisper-runtime-linux-arm64-a.shejane-runtime-asset
          if-no-files-found: error

  linux-arm64-documents-worker:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build reproducible Linux arm64 Documents Worker
        shell: bash
        run: |
          set -euo pipefail
          worker="${RUNNER_TEMP}/documents-worker"
          bash runtime/plugins/office/documents/build_worker_linux_arm64.sh "${worker}"
          tar --sort=name --mtime='@1784160000' --owner=0 --group=0 --numeric-owner \
            -C "${RUNNER_TEMP}" -cf - documents-worker \
            | gzip -n > "${RUNNER_TEMP}/documents-worker-linux-arm64.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: documents-worker-linux-arm64
          path: ${{ runner.temp }}/documents-worker-linux-arm64.tar.gz
          if-no-files-found: error

