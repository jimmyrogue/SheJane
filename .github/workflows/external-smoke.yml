name: External Smoke

on:
  # Daily at 18:00 UTC = 02:00 Asia/Shanghai. Catches credentials
  # drift (Stripe webhook secret rotated, Tavily key revoked, S3
  # bucket policy changed, etc.) the morning after, before users
  # notice. Off-hours slot so a failing nightly run doesn't drown
  # out regular CI signal during work hours.
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  external-smoke:
    name: Real service smoke
    runs-on: ubuntu-latest
    env:
      RUN_EXTERNAL_SMOKE: "1"
      API_BASE_URL: ${{ secrets.JIANDANLY_API_BASE_URL }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run external smoke scripts
        run: |
          test -n "$API_BASE_URL"
          ./scripts/smoke-external.sh
