name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # Lint is split out so style/format failures show up as their own
  # check on the PR — easier to scan than mixed inside the test job
  # output, and faster to fail (no docker / playwright bootstrap). The
  # checks here mirror what `make lint` runs locally.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install Python deps
        run: uv sync
        working-directory: services/runtime

      - name: ruff check
        run: uv run ruff check .
        working-directory: services/runtime

      - name: ruff format --check
        run: uv run ruff format --check .
        working-directory: services/runtime

      - name: Project guards
        run: ./scripts/check.sh

      # Schema-drift guard — `make schemas` regenerates openapi.json
      # + generated.ts from the daemon's pydantic models. If the
      # committed files don't match the regenerated output, the PR
      # changed a response_model but didn't run `make schemas`.
      # Catches the failure mode where a Python-side change silently
      # diverges from what the TS client expects.
      - name: Install Node deps for codegen
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Schema drift (make schemas + git diff)
        run: |
          ./scripts/export-daemon-openapi.sh
          pnpm --filter @shejane/runtime-sdk generate
          if ! git diff --exit-code -- packages/runtime-sdk/openapi.json packages/runtime-sdk/src/generated.ts; then
            echo "::error::Schemas drifted. Run 'make schemas' locally and commit the result."
            exit 1
          fi

  # Unit + build stay separate from the live HTTP contract check so each
  # failure keeps a clear owner.
  test:
    name: Tests (unit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python (local-host daemon)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install local-host (Python) dependencies
        run: uv sync
        working-directory: services/runtime

      - name: Unit suites + build
        run: make test build

  # Contract round-trip — the ONE thing that would have caught the
  # 9+ silent shape drifts in the Phase 5'+ migration. Boots a real
  # Runtime, runs the TypeScript SDK contract suite against it over HTTP, asserts
  # the response shapes match what the renderer reads. No
  # MockTransport involved on either side.
  #
  # Why it's a separate job (not part of deterministic-tests):
  #   • Needs a running daemon as a background service — pollutes the
  #     hermetic test env.
  #   • Failure mode is "client and daemon disagree on a contract" —
  #     surfacing it as its own check name makes triage instant.
  contract:
    name: Contract round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install daemon deps
        run: uv sync
        working-directory: services/runtime

      - name: Start daemon
        run: |
          mkdir -p /tmp/contract/data
          SHEJANE_FAKE_LLM=1 PYTHONUNBUFFERED=1 \
          nohup uv run shejane-runtime \
            --host 127.0.0.1 \
            --port 17371 \
            --token dev-local-token \
            --data-dir /tmp/contract/data \
            > /tmp/contract/daemon.log 2>&1 &
          echo $! > /tmp/contract/daemon.pid
        working-directory: services/runtime

      - name: Wait for daemon /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:17371/local/v1/health >/dev/null 2>&1; then
              echo "daemon ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::daemon failed to start"
          cat /tmp/contract/daemon.log
          exit 1

      - name: Run contract suite
        env:
          VITE_TEST_LOCAL_HOST_URL: http://127.0.0.1:17371
          VITE_TEST_LOCAL_HOST_TOKEN: dev-local-token
        run: pnpm --filter @shejane/desktop test:contract

      - name: Daemon log on failure
        if: failure()
        run: cat /tmp/contract/daemon.log || true

      - name: Stop daemon
        if: always()
        run: |
          PID=$(cat /tmp/contract/daemon.pid 2>/dev/null || true)
          [ -n "$PID" ] && kill -9 "$PID" 2>/dev/null || true
