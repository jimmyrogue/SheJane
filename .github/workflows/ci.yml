name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # Lint is split out so style/format failures show up as their own
  # check on the PR — easier to scan than mixed inside the test job
  # output, and faster to fail (no docker / playwright bootstrap). The
  # checks here mirror what `make lint` runs locally.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install Python deps
        run: uv sync
        working-directory: services/runtime

      - name: ruff check
        run: uv run ruff check .
        working-directory: services/runtime

      - name: ruff format --check
        run: uv run ruff format --check .
        working-directory: services/runtime

      - name: Project guards
        run: ./scripts/check.sh

      # Schema-drift guard — `make schemas` regenerates openapi.json
      # + generated.ts from the daemon's pydantic models. If the
      # committed files don't match the regenerated output, the PR
      # changed a response_model but didn't run `make schemas`.
      # Catches the failure mode where a Python-side change silently
      # diverges from what the TS client expects.
      - name: Install Node deps for codegen
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Schema drift (make schemas + git diff)
        run: |
          ./scripts/export-daemon-openapi.sh
          pnpm --filter @shejane/runtime-sdk generate
          if ! git diff --exit-code -- packages/runtime-sdk/openapi.json packages/runtime-sdk/src/generated.ts; then
            echo "::error::Schemas drifted. Run 'make schemas' locally and commit the result."
            exit 1
          fi

  # Unit + build stay separate from the live HTTP contract check so each
  # failure keeps a clear owner.
  test:
    name: Tests (unit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python (local-host daemon)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Go (Managed Worker guest)
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install local-host (Python) dependencies
        run: uv sync
        working-directory: services/runtime

      - name: Unit suites + build
        run: make test build

  # The Windows Managed Worker host boundary uses Windows-only LPAC and Job
  # Object APIs, so it must compile and execute on a real Windows runner. This
  # gate intentionally proves only the native host confinement boundary; the
  # QEMU guest transport has a separate black-box gate.
  windows-managed-worker-host:
    name: Windows Managed Worker host gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate the MSVC developer environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $installation) {
            throw "MSVC C++ tools are unavailable on the Windows runner"
          }
          "VSDEVCMD=$installation\Common7\Tools\VsDevCmd.bat" | Out-File `
            -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build the LPAC and Job Object launcher
        shell: cmd
        run: >-
          call "%VSDEVCMD%" -arch=x64 &&
          cl /nologo /std:c++20 /EHsc /W4 /WX /MT
          apps\desktop\native\managed-worker-vm-windows.cpp
          /Fe:"%RUNNER_TEMP%\shejane-managed-worker-vm.exe"

      - name: Run the native confinement self-test
        shell: pwsh
        run: '& "$env:RUNNER_TEMP\shejane-managed-worker-vm.exe" --self-test'

  # Full black-box Runtime E2E. The repository script owns isolation, startup,
  # readiness, cleanup and failure logs so local and CI runs cannot drift.
  #
  # Why it's a separate job (not part of deterministic-tests):
  #   • Needs a running daemon as a background service — pollutes the
  #     hermetic test env.
  #   • Failure mode is "client and daemon disagree on a contract" —
  #     surfacing it as its own check name makes triage instant.
  contract:
    name: Runtime E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install daemon deps
        run: uv sync
        working-directory: services/runtime

      - name: Run Runtime E2E
        run: make test-e2e
