name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # Lint is split out so style/format failures show up as their own
  # check on the PR — easier to scan than mixed inside the test job
  # output, and faster to fail (no docker / playwright bootstrap). The
  # checks here mirror what `make lint` runs locally.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/cloud/go.mod
          cache-dependency-path: services/cloud/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install Python deps
        run: uv sync
        working-directory: services/runtime

      - name: ruff check
        run: uv run ruff check .
        working-directory: services/runtime

      - name: ruff format --check
        run: uv run ruff format --check .
        working-directory: services/runtime

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt -w needed on:"
            echo "$unformatted"
            exit 1
          fi
        working-directory: services/cloud

      - name: go vet
        run: go vet ./...
        working-directory: services/cloud

      - name: No platform-paid keys in daemon
        run: ./scripts/check-no-platform-keys-in-daemon.sh

      # Schema-drift guard — `make schemas` regenerates openapi.json
      # + generated.d.ts from the daemon's pydantic models. If the
      # committed files don't match the regenerated output, the PR
      # changed a response_model but didn't run `make schemas`.
      # Catches the failure mode where a Python-side change silently
      # diverges from what the TS client expects.
      - name: Install Node deps for codegen
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Schema drift (make schemas + git diff)
        run: |
          ./scripts/export-daemon-openapi.sh
          pnpm --filter shejane-client exec openapi-typescript src/shared/local-host/openapi.json -o src/shared/local-host/generated.d.ts
          if ! git diff --exit-code -- apps/desktop/src/shared/local-host/openapi.json apps/desktop/src/shared/local-host/generated.d.ts; then
            echo "::error::Schemas drifted. Run 'make schemas' locally and commit the result."
            exit 1
          fi

  # Unit + race + build. Split out from E2E so a Playwright flake can't
  # mask a unit failure (and vice-versa) — each surfaces as its own
  # check. `test-race` runs `go test -race ./...`, which supersedes the
  # plain Go pass, so we run the non-Go unit suites + the race suite +
  # a full build (compile check) and skip the redundant non-race run.
  test:
    name: Tests (unit + race + build)
    runs-on: ubuntu-latest
    # Postgres for the store dual-impl conformance cross-check. Image matches
    # the dev/prod compose (pgvector/pg16) so migrations apply identically.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: shejane
          POSTGRES_USER: shejane
          POSTGRES_PASSWORD: shejane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shejane -d shejane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/cloud/go.mod
          cache-dependency-path: services/cloud/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python (local-host daemon)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install local-host (Python) dependencies
        run: uv sync
        working-directory: services/runtime

      - name: Unit suites + race + build
        run: make client-test admin-test local-host-test test-race build

      # Cross-check memory.go vs postgres.go via the store conformance suite.
      # Migrations apply with the same versioned runner as `make migrate`; the
      # suite skips Postgres when TEST_DATABASE_URL is unset (so local runs stay
      # DB-free), so this step is where the Postgres path actually runs.
      - name: Store conformance (postgres cross-check)
        env:
          TEST_DATABASE_URL: postgres://shejane:shejane@localhost:5432/shejane?sslmode=disable
          DATABASE_URL: postgres://shejane:shejane@localhost:5432/shejane?sslmode=disable
        run: |
          cd services/cloud
          go run ./cmd/migrate -dir ./migrations
          go test ./internal/store/ -run TestStoreConformance -v

  # Playwright simulated E2E. Its webServer launches `vite dev` in BOTH
  # apps/desktop/ and admin/, so both need their deps installed (not just tests/e2e/).
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter shejane-e2e exec playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: make test-e2e

  # Contract round-trip — the ONE thing that would have caught the
  # 9+ silent shape drifts in the Phase 5'+ migration. Boots a real
  # daemon, runs the TypeScript client against it over HTTP, asserts
  # the response shapes match what the renderer reads. No
  # MockTransport involved on either side.
  #
  # Why it's a separate job (not part of deterministic-tests):
  #   • Needs a running daemon as a background service — pollutes the
  #     hermetic test env.
  #   • Failure mode is "client and daemon disagree on a contract" —
  #     surfacing it as its own check name makes triage instant.
  contract:
    name: Contract round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/runtime/uv.lock

      - name: Install workspace dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install daemon deps
        run: uv sync
        working-directory: services/runtime

      - name: Start daemon
        run: |
          mkdir -p /tmp/contract
          SHEJANE_LOCAL_HOST_TOKEN=dev-local-token \
          SHEJANE_LOCAL_HOST_PORT=17371 \
          SHEJANE_LOCAL_HOST_URL=http://127.0.0.1:17371 \
          SHEJANE_CLOUD_BASE_URL=http://localhost:8080 \
          SHEJANE_FAKE_LLM=1 \
          PYTHONUNBUFFERED=1 \
          nohup uv run python -m local_host \
            > /tmp/contract/daemon.log 2>&1 &
          echo $! > /tmp/contract/daemon.pid
        working-directory: services/runtime

      - name: Wait for daemon /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:17371/local/v1/health >/dev/null 2>&1; then
              echo "daemon ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::daemon failed to start"
          cat /tmp/contract/daemon.log
          exit 1

      - name: Run contract suite
        env:
          VITE_TEST_LOCAL_HOST_URL: http://127.0.0.1:17371
          VITE_TEST_LOCAL_HOST_TOKEN: dev-local-token
        run: pnpm --filter shejane-client test:contract

      - name: Daemon log on failure
        if: failure()
        run: cat /tmp/contract/daemon.log || true

      - name: Stop daemon
        if: always()
        run: |
          PID=$(cat /tmp/contract/daemon.pid 2>/dev/null || true)
          [ -n "$PID" ] && kill -9 "$PID" 2>/dev/null || true
