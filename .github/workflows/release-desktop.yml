name: Release Desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macos
            arch: arm64
            target: mac
          - runner: macos-15-intel
            platform: macos
            arch: x64
            target: mac
          - runner: windows-latest
            platform: windows
            arch: x64
            target: win
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: pnpm install --frozen-lockfile
      - name: Build Runtime
        working-directory: services/runtime
        run: |
          uv sync --frozen
          uv run pyinstaller shejane-runtime.spec --noconfirm --clean
      - name: Set Desktop version
        if: github.ref_type == 'tag'
        working-directory: apps/desktop
        shell: bash
        run: pnpm version "${GITHUB_REF_NAME#desktop-v}" --no-git-tag-version --allow-same-version
      - name: Package Desktop
        working-directory: apps/desktop
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm build:desktop
          pnpm exec electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/latest*.yml
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
