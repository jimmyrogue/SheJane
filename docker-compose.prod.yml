# Production stack — pulls prebuilt images from GHCR (published by
# .github/workflows/release.yml) instead of building from source.
#
#   make deploy                 # pull :latest + (re)start
#   make deploy IMAGE_TAG=v0.3  # pin a specific release
#   make deploy-logs            # tail
#
# Before the first deploy, on the server:
#   1. cp .env.example .env and replace every production placeholder.
#   2. Point your DNS A records for APP_DOMAIN + ADMIN_DOMAIN at the
#      host — Caddy auto-provisions Let's Encrypt TLS on first hit.
#
# This file runs Postgres in-compose (data in a named volume). To use an
# external managed database instead, drop the postgres service and set
# DATABASE_URL on the api service to your DB.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: shejane
      POSTGRES_USER: shejane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shejane -d shejane"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No host port: the DB is reachable only on the internal network.

  # Applies pending SQL migrations once, recording schema_migrations, then
  # exits. The api waits for this to complete successfully before starting.
  migrate:
    image: ghcr.io/jimmyrogue/shejane-api:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://shejane:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/shejane?sslmode=disable
    command: ["/app/shejane-migrate"]
    restart: "no"

  api:
    image: ghcr.io/jimmyrogue/shejane-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    # Real values come from .env (required). The block below pins the
    # in-compose topology + flips two dev defaults to production-safe.
    env_file:
      - path: .env
        required: true
    environment:
      HTTP_ADDR: ":8080"
      SHEJANE_ENV: production
      DATABASE_URL: postgres://shejane:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/shejane?sslmode=disable
      MOCK_LLM: ${MOCK_LLM:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    # Exposed on loopback only — Caddy (same network) fronts it. Lets a
    # host-level proxy or smoke check reach the API without opening it
    # to the world.
    ports:
      - "127.0.0.1:8080:8080"
    # Liveness check (busybox wget ships in the alpine runtime image). Marks
    # the container unhealthy if the process stops serving, so Docker can
    # restart it and `docker compose ps` surfaces the problem.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    image: ghcr.io/jimmyrogue/shejane-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    # No host port: served through Caddy.

  admin:
    image: ghcr.io/jimmyrogue/shejane-admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    # No host port: served through Caddy.

  # TLS entry point. Routes APP_DOMAIN → client (and /api/* → api), and
  # ADMIN_DOMAIN → admin (and /api/* → api). Domains come from .env.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - client
      - admin

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
