services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: shejane
      POSTGRES_USER: shejane
      POSTGRES_PASSWORD: shejane
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shejane -d shejane"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./services/cloud
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://shejane:shejane@postgres:5432/shejane?sslmode=disable
    command: ["/app/shejane-migrate"]

  api:
    build:
      context: ./services/cloud
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://shejane:shejane@postgres:5432/shejane?sslmode=disable
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:5173}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:5174}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-change-me}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      MOCK_LLM: ${MOCK_LLM:-true}
      FAST_PROVIDER_BASE_URL: ${FAST_PROVIDER_BASE_URL:-https://api.deepseek.com}
      FAST_PROVIDER_API_KEY: ${FAST_PROVIDER_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_DOCUMENT_PREFIX: ${S3_DOCUMENT_PREFIX:-documents}
    ports:
      - "${API_PORT:-8080}:8080"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-8080}
    ports:
      - "${CLIENT_PORT:-5173}:80"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-8080}
    ports:
      - "${ADMIN_PORT:-5174}:80"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - client
      - admin

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
